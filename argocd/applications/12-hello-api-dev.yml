apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-api-dev
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://github.com/ihebsd/microservices.git
    targetRevision: main
    path: environments/dev
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
